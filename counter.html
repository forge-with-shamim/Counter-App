<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CounterV2</title>
    <link rel="stylesheet" href="style.css">
</head>  
<body>

    <div class="card">
        <h1>Counter App</h1>
    <div class="result">
        <h1 id="btn">0</h1>
        <p class="count" id="count">Current Count:</p>
    </div>
    <div class="buttons">
        <div class="pairBtn">
            <button class="decrement" id="decrement">Decrement</button>
            <button class="increment" id="increment"> Increase</button>
        </div>
            <button class="reset" id="reset">Reset</button>
    </div>    
            <div class="keyboard-hints">
                <p>Keyboard Shortcuts:</p>

        <div class="shortcut-keys">
            <span>↑ Increase</span>
            <span>↓ Decrease</span>
            <span>Space: Reset</span>
        </div>
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
